<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bug Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    tbody tr { cursor: pointer; }
    tbody tr:hover { background-color: #f8f9fa; }
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <span class="navbar-brand fw-bold"><i class="bi bi-bug me-2"></i>Bug Tracker</span>
    <button class="btn btn-danger" id="btn-new-bug">
      <i class="bi bi-plus-lg me-1"></i>New Bug
    </button>
  </div>
</nav>

<div class="container pb-5">

  <!-- Stats row -->
  <div class="row g-3 mb-4" id="stats-row">
    <div class="col-4">
      <div class="card border-primary text-center py-2">
        <div class="fs-2 fw-bold text-primary" id="stat-open">0</div>
        <div class="text-muted small">Open</div>
      </div>
    </div>
    <div class="col-4">
      <div class="card border-warning text-center py-2">
        <div class="fs-2 fw-bold text-warning" id="stat-in-progress">0</div>
        <div class="text-muted small">In Progress</div>
      </div>
    </div>
    <div class="col-4">
      <div class="card border-success text-center py-2">
        <div class="fs-2 fw-bold text-success" id="stat-closed">0</div>
        <div class="text-muted small">Closed</div>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="card shadow-sm mb-3">
    <div class="card-body py-2 d-flex gap-2 flex-wrap">
      <select id="filter-status" class="form-select form-select-sm" style="width:auto">
        <option value="">All statuses</option>
        <option value="open">Open</option>
        <option value="in_progress">In Progress</option>
        <option value="closed">Closed</option>
      </select>
      <select id="filter-severity" class="form-select form-select-sm" style="width:auto">
        <option value="">All severities</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <span class="ms-auto text-muted small align-self-center" id="bug-count"></span>
    </div>
  </div>

  <!-- Bug table -->
  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Title</th>
            <th>Reporter</th>
            <th>Severity</th>
            <th>Status</th>
            <th>Created</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="bugs-body">
          <tr id="empty-row">
            <td colspan="7" class="text-center text-muted py-5">
              <i class="bi bi-check2-circle display-6 d-block mb-2"></i>
              No bugs found — great news, or use the button above to log one!
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- New / Edit Bug Modal -->
<div class="modal fade" id="bugModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-title">New Bug</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-id" />
        <div class="mb-3">
          <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
          <input type="text" id="field-title" class="form-control" placeholder="Short description of the bug" />
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Severity</label>
            <select id="field-severity" class="form-select">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Reporter</label>
            <input type="text" id="field-reporter" class="form-control" placeholder="Your name" />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Description</label>
          <textarea id="field-description" class="form-control" rows="2" placeholder="What is the bug?"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Steps to Reproduce</label>
          <textarea id="field-steps" class="form-control" rows="3" placeholder="1. Go to...&#10;2. Click on...&#10;3. See error"></textarea>
        </div>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Expected Result</label>
            <textarea id="field-expected" class="form-control" rows="2" placeholder="What should happen?"></textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Actual Result</label>
            <textarea id="field-actual" class="form-control" rows="2" placeholder="What actually happens?"></textarea>
          </div>
        </div>
        <!-- Status (edit mode only) -->
        <div class="mt-3 d-none" id="status-section">
          <label class="form-label fw-semibold">Status</label>
          <div id="status-buttons" class="d-flex gap-2"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger" id="btn-delete-bug" data-bs-dismiss="modal">Delete</button>
        <button class="btn btn-primary" id="btn-save-bug">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
